<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        /**
         * TEACHING MOMENT: Corrected Pricing Engine
         * 
         * Key principle: Cash price = merchant's desired base price
         *                Card price = adjusted upward to offset discount
         * 
         * Formula: If merchant wants to net $100 (cash price)
         *          and offers 3.5% cash discount:
         *          cardPrice * (1 - 0.035) = $100
         *          cardPrice = $100 / 0.965 = $103.63
         * 
         * This way, whether customer pays with card ($103.63) or cash ($100),
         * the merchant nets their target price of $100.
         */
        const PricingEngine = {
            /**
             * Calculate card price from cash price (merchant's base/desired price)
             */
            calculateCardPrice(cashPrice, discountPercent, roundingRule) {
                if (discountPercent === 0) return cashPrice;
                
                // Card price must be higher so that when discounted, it equals cash price
                const multiplier = 1 / (1 - (discountPercent / 100));
                const rawCardPrice = cashPrice * multiplier;
                
                return this.applyRounding(rawCardPrice, roundingRule);
            },

            /**
             * Rounding rules for clean pricing
             */
            applyRounding(price, rule) {
                switch(rule) {
                    case 'none':
                        return Math.round(price * 100) / 100;
                    case 'nearest_nickel':
                        return Math.round(price * 20) / 20;
                    case 'nearest_dime':
                        return Math.round(price * 10) / 10;
                    case 'nearest_quarter':
                        return Math.round(price * 4) / 4;
                    case 'ends_99':
                        const dollars = Math.floor(price);
                        const candidate = dollars + 0.99;
                        return candidate >= price ? candidate : dollars + 1.99;
                    case 'ends_95':
                        const dollars95 = Math.floor(price);
                        const candidate95 = dollars95 + 0.95;
                        return candidate95 >= price ? candidate95 : dollars95 + 1.95;
                    default:
                        return price;
                }
            },

            /**
             * Calculate actual discount amount
             */
            calculateDiscount(cardPrice, cashPrice) {
                return cardPrice - cashPrice;
            },

            /**
             * Calculate processing fee based on card type and program
             */
            calculateProcessingFee(amount, cardType, feeProgram) {
                // Standard processing rates
                const rates = {
                    credit: 0.03, // 3%
                    debit: 0.023   // 2.3%
                };
                
                return amount * rates[cardType];
            },

            /**
             * Calculate fee offset (what merchant collects to offset processing)
             */
            calculateFeeOffset(cashPrice, cardPrice, paymentMethod, feeProgram, cardType) {
                if (paymentMethod === 'cash') {
                    return 0; // No fees on cash
                }

                if (feeProgram === 'surcharge') {
                    // Surcharge program: direct pass-through
                    return cardType === 'credit' ? cashPrice * 0.03 : cashPrice * 0.023;
                } else if (feeProgram === 'cash_discount') {
                    // Cash discount: markup is the offset
                    return cardPrice - cashPrice;
                }

                return 0;
            }
        };

        // Product library - cashPrice is what merchant wants to net
        const INITIAL_PRODUCTS = [
            { id: 1, name: 'Espresso', cashPrice: 3.50, category: 'F&B', sku: 'FB-001' },
            { id: 2, name: 'Cappuccino', cashPrice: 4.75, category: 'F&B', sku: 'FB-002' },
            { id: 3, name: 'Avocado Toast', cashPrice: 12.00, category: 'F&B', sku: 'FB-003' },
            { id: 4, name: 'Caesar Salad', cashPrice: 14.50, category: 'F&B', sku: 'FB-004' },
            { id: 5, name: 'Premium T-Shirt', cashPrice: 28.00, category: 'Retail', sku: 'RT-001' },
            { id: 6, name: 'Denim Jeans', cashPrice: 79.99, category: 'Retail', sku: 'RT-002' },
            { id: 7, name: 'Running Shoes', cashPrice: 89.99, category: 'Retail', sku: 'RT-003' },
            { id: 8, name: 'Yoga Mat', cashPrice: 45.00, category: 'Retail', sku: 'RT-004' },
            { id: 9, name: 'Haircut & Style', cashPrice: 65.00, category: 'Services', sku: 'SV-001' },
            { id: 10, name: 'Hair Coloring', cashPrice: 120.00, category: 'Services', sku: 'SV-002' },
            { id: 11, name: 'Massage (60min)', cashPrice: 95.00, category: 'Services', sku: 'SV-003' },
            { id: 12, name: 'Facial Treatment', cashPrice: 85.00, category: 'Services', sku: 'SV-004' },
        ];

        function VirtualTerminalPOS() {
            // Navigation
            const [currentView, setCurrentView] = useState('settings');
            const [manualEntryAmount, setManualEntryAmount] = useState('');
            const [invoiceNumber] = useState(Math.floor(1000 + Math.random() * 9000));
            const [invoiceItems, setInvoiceItems] = useState([]);
            const [currentInvoiceItem, setCurrentInvoiceItem] = useState({
                description: '',
                amount: '',
                quantity: 1
            });

            // Fee Program Settings
            const [feeProgram, setFeeProgram] = useState('cash_discount'); // 'surcharge' or 'cash_discount'
            const [cashDiscountPercent, setCashDiscountPercent] = useState('3.5');
            const [roundingRule, setRoundingRule] = useState('ends_99');
            const [autoCalculateListPrices, setAutoCalculateListPrices] = useState(true);

            // Shopping cart
            const [cart, setCart] = useState([]);
            const [selectedPaymentMethod, setSelectedPaymentMethod] = useState(null);
            const [selectedCardType, setSelectedCardType] = useState('credit'); // 'credit' or 'debit'
            const [orderComplete, setOrderComplete] = useState(false);

            // Sales tracking for reporting
            const [completedSales, setCompletedSales] = useState([]);

            /**
             * TEACHING MOMENT: Adjusted products calculation
             * 
             * Now properly implements:
             * - cashPrice = merchant's target (what they want to net)
             * - cardPrice = adjusted upward based on discount %
             */
            const adjustedProducts = useMemo(() => {
                const discountPercent = parseFloat(cashDiscountPercent) || 0;

                return INITIAL_PRODUCTS.map(product => {
                    let cardPrice, displayPrice, cashDiscountAmount, cashDiscountedPrice;

                    if (feeProgram === 'cash_discount') {
                        if (autoCalculateListPrices) {
                            cardPrice = PricingEngine.calculateCardPrice(
                                product.cashPrice,
                                discountPercent,
                                roundingRule
                            );
                            cashDiscountAmount = PricingEngine.calculateDiscount(cardPrice, product.cashPrice);
                            cashDiscountedPrice = product.cashPrice;
                            displayPrice = cardPrice;
                        } else {
                            cardPrice = product.cashPrice;
                            cashDiscountAmount = (product.cashPrice * discountPercent) / 100;
                            cashDiscountedPrice = Math.max(0, product.cashPrice - cashDiscountAmount);
                            displayPrice = product.cashPrice;
                        }
                    } else if (feeProgram === 'surcharge') {
                        cardPrice = product.cashPrice;
                        cashDiscountAmount = 0;
                        cashDiscountedPrice = product.cashPrice;
                        displayPrice = product.cashPrice;
                    } else {
                        cardPrice = product.cashPrice;
                        cashDiscountAmount = 0;
                        cashDiscountedPrice = product.cashPrice;
                        displayPrice = product.cashPrice;
                    }

                    return {
                        ...product,
                        cardPrice,
                        displayPrice,
                        discount: cashDiscountAmount,
                        cashDiscountAmount,
                        cashDiscountedPrice
                    };
                });
            }, [feeProgram, cashDiscountPercent, roundingRule, autoCalculateListPrices]);

            // Cart operations
            const addToCart = (product) => {
                const existingItem = cart.find(item => item.id === product.id);
                if (existingItem) {
                    setCart(cart.map(item =>
                        item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
                    ));
                } else {
                    setCart([...cart, { ...product, quantity: 1 }]);
                }
            };

            const updateQuantity = (productId, newQuantity) => {
                if (newQuantity <= 0) {

                } else if (digit === '.' && manualEntryAmount.includes('.')) {
                    return; // Don't allow multiple decimals
                } else {
                    setManualEntryAmount(manualEntryAmount + digit);
                }
            };

            const proceedWithManualEntry = () => {
                const amount = parseFloat(manualEntryAmount);
                if (!amount || amount <= 0) return;

                // Calculate prices based on settings
                let cardPrice, cashPrice, cashDiscountAmount, cashDiscountedPrice;

                if (feeProgram === 'cash_discount') {
                    if (autoCalculateListPrices) {
                        // User entered cash price, calculate card price
                        cashPrice = amount;
                        cardPrice = PricingEngine.calculateCardPrice(amount, parseFloat(cashDiscountPercent), roundingRule);
                        cashDiscountAmount = PricingEngine.calculateDiscount(cardPrice, cashPrice);
                        cashDiscountedPrice = cashPrice;
                    } else {
                        // User entered list price
                        cardPrice = amount;
                        cashPrice = amount;
                        cashDiscountAmount = (amount * parseFloat(cashDiscountPercent)) / 100;
                        cashDiscountedPrice = Math.max(0, amount - cashDiscountAmount);
                    }
                } else {
                    // Surcharge mode - user entered base price
                    cardPrice = amount;
                    cashPrice = amount;
                    cashDiscountAmount = 0;
                    cashDiscountedPrice = amount;
                }

                // Create synthetic product
                const manualProduct = {
                    id: Date.now(), // Unique ID
                    name: 'Manual Entry',
                    cashPrice: cashPrice,
                    cardPrice: cardPrice,
                    cashDiscountAmount: cashDiscountAmount,
                    cashDiscountedPrice: cashDiscountedPrice,

                // Reset checkout state and add manual entry

                setSelectedCardType('credit');

                let cardPrice, cashPrice, cashDiscountAmount, cashDiscountedPrice;

                        cardPrice = PricingEngine.calculateCardPrice(amount, parseFloat(cashDiscountPercent), roundingRule);

                                                onClick={() => setSelectedPaymentMethod('cash')}
                                            >
                                                <div className="price-option-icon">💵</div>
                                                <div className="price-option-label">Pay with Cash / ACH</div>
                                                <div className="price-option-amount" style={{color: '#27ae60'}}>
                                                    ${orderTotals.cashTotal.toFixed(2)}
                                                </div>
                                                <div className="price-option-badge">
                                                    {autoCalculateListPrices ? `Save $${orderTotals.savingsAmount.toFixed(2)}` : `Discount $${orderTotals.savingsAmount.toFixed(2)}`}
                                                </div>
                                                <div style={{fontSize: '0.75rem', color: '#65676b', marginTop: '0.5rem'}}>
                                                    Cash or ACH Transfer
                                                </div>
                                            </div>
                                        </div>

                                        <div style={{marginTop: '1.5rem', padding: '1rem', background: '#f0f2f5', borderRadius: '6px', textAlign: 'center'}}>
                                            <strong>Cash Discount Active:</strong> {autoCalculateListPrices
                                                ? `Choose your preferred payment method. Cash/ACH payments receive the discounted base price.`
                                                : `Choose your preferred payment method. Cash/ACH payments receive a ${cashDiscountPercent}% discount off the listed price.`}
                                        </div>
                                    </>
                                ) : feeProgram === 'surcharge' ? (
                                    <>
                                        <div className="form-group" style={{maxWidth: '400px', margin: '0 auto 1.5rem'}}>
                                            <label className="form-label">Card Type (for surcharge calculation)</label>
                                            <select
                                                className="form-select"
                                                value={selectedCardType}
                                                onChange={(e) => setSelectedCardType(e.target.value)}
                                            >
                                                <option value="credit">Credit Card (3% surcharge)</option>
                                                <option value="debit">Debit Card (no surcharge)</option>
                                            </select>
                                        </div>

                                        <div className="price-comparison">
                                            <div
                                                className={`price-option ${selectedPaymentMethod === 'card' ? 'selected' : ''}`}
                                                onClick={() => setSelectedPaymentMethod('card')}
                                            >
                                                <div className="price-option-icon">💳</div>
                                                <div className="price-option-label">Pay with Card</div>
                                                <div className="price-option-amount">
                                                    ${orderTotals.cardTotal.toFixed(2)}
                                                </div>
                                                <div style={{fontSize: '0.75rem', color: '#e74c3c', marginTop: '0.5rem'}}>
                                                    Includes ${orderTotals.surchargeAmount.toFixed(2)} surcharge
                                                </div>
                                            </div>

                                            <div
                                                className={`price-option ${selectedPaymentMethod === 'cash' ? 'selected' : ''}`}
                                                onClick={() => setSelectedPaymentMethod('cash')}
                                            >
                                                <div className="price-option-icon">💵</div>
                                                <div className="price-option-label">Pay with Cash</div>
                                                <div className="price-option-amount" style={{color: '#27ae60'}}>
                                                    ${orderTotals.cashTotal.toFixed(2)}
                                                </div>
                                                <div className="price-option-badge">
                                                    No Surcharge
                                                </div>
                                                <div style={{fontSize: '0.75rem', color: '#65676b', marginTop: '0.5rem'}}>
                                                    Cash or ACH Transfer
                                                </div>
                                            </div>
                                        </div>
                                    </>
                                ) : (
                                    <div style={{textAlign: 'center', padding: '2rem'}}>
                                        <div className="price-option-amount">
                                            ${orderTotals.cashTotal.toFixed(2)}
                                        </div>
                                        <div style={{marginTop: '1.5rem'}}>
                                            <button
                                                className="btn btn-primary"
                                                onClick={() => completeOrder('card', 'credit')}
                                                style={{maxWidth: '300px'}}
                                            >
                                                Complete Payment
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {selectedPaymentMethod && (
                                    <div style={{marginTop: '1.5rem', display: 'flex', gap: '1rem'}}>
                                        <button
                                            className="btn btn-success"
                                            onClick={() => completeOrder(selectedPaymentMethod, selectedCardType)}
                                        >
                                            Complete Order - ${(selectedPaymentMethod === 'cash' ? orderTotals.cashTotal : orderTotals.cardTotal).toFixed(2)}
                                        </button>
                                        <button
                                            className="btn btn-secondary"
                                            onClick={() => setCurrentView('order')}
                                            style={{flex: '0 0 auto', width: 'auto'}}
                                        >
                                            ← Back
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderReportsView = () => (
                <div className="content-wrapper">
                    <div className="page-header">
                        <h1 className="page-title">Fee Reporting & Analytics</h1>
                        <p className="page-description">
                            Track processing fees vs. fee offsets to demonstrate zero-fee outcomes
                        </p>
                    </div>

                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-label">Total Transactions</div>
                            <div className="stat-value">{salesReport.totalTransactions}</div>
                            <div className="stat-helper">
                                {salesReport.cardSales} card • {salesReport.cashSales} cash
                            </div>
                        </div>

                        <div className="stat-card">
                            <div className="stat-label">Total Sales Volume</div>
                            <div className="stat-value">${salesReport.totalSales.toFixed(2)}</div>
                            <div className="stat-helper">Gross revenue</div>
                        </div>

                        <div className="stat-card">
                            <div className="stat-label">Processing Fees Paid</div>
                            <div className="stat-value negative">
                                -${salesReport.totalProcessingFees.toFixed(2)}
                            </div>
                            <div className="stat-helper">Card processing costs</div>
                        </div>

                        <div className="stat-card">
                            <div className="stat-label">Fee Offsets Collected</div>
                            <div className="stat-value positive">
                                +${salesReport.totalFeeOffsets.toFixed(2)}
                            </div>
                            <div className="stat-helper">
                                {feeProgram === 'cash_discount'
                                    ? (completedSales.some(sale => sale.autoCalculateListPrices) ? 'Card markups collected' : 'No markups collected')
                                    : 'Surcharges'}
                            </div>
                        </div>

                        <div className="stat-card">
                            <div className="stat-label">Net Processing Cost</div>
                            <div className={`stat-value ${salesReport.totalNetFees <= 0 ? 'positive' : 'negative'}`}>
                                ${salesReport.totalNetFees.toFixed(2)}
                            </div>
                            <div className="stat-helper">
                                {salesReport.totalNetFees <= 0 ? '✓ Zero or negative net cost!' : 'Effective cost'}
                            </div>
                        </div>

                        <div className="stat-card">
                            <div className="stat-label">Effective Fee Rate</div>
                            <div className={`stat-value ${salesReport.effectiveFeeRate <= 0 ? 'positive' : 'negative'}`}>
                                {salesReport.effectiveFeeRate.toFixed(2)}%
                            </div>
                            <div className="stat-helper">Net fees ÷ total sales</div>
                        </div>
                    </div>

                    {salesReport.totalNetFees <= 0 && salesReport.totalTransactions > 0 && (
                        <div className="alert alert-success">
                            <strong>🎉 Zero Fee Success!</strong><br/>
                            Your fee program has successfully offset all processing costs. 
                            You've collected ${salesReport.totalFeeOffsets.toFixed(2)} in {feeProgram === 'cash_discount' ? 'card price adjustments' : 'surcharges'} 
                            while paying ${salesReport.totalProcessingFees.toFixed(2)} in processing fees, 
                            resulting in a net of ${Math.abs(salesReport.totalNetFees).toFixed(2)} {salesReport.totalNetFees < 0 ? 'profit' : 'even'}.
                        </div>
                    )}

                    {completedSales.length === 0 && (
                        <div className="card">
                            <div className="cart-empty">
                                <div className="cart-empty-icon">📊</div>
                                <p>No transactions yet</p>
                                <p style={{fontSize: '0.875rem', marginTop: '0.5rem', color: '#65676b'}}>
                                    Complete some sales to see fee reporting data
                                </p>
                            </div>
                        </div>
                    )}

                    {completedSales.length > 0 && (
                        <div className="card">
                            <div className="card-header">
                                <h2 className="card-title">Transaction History</h2>
                            </div>

                            <table className="order-table">
                                <thead>
                                    <tr>
                                        <th>Time</th>
                                        <th>Payment</th>
                                        <th style={{textAlign: 'right'}}>Amount</th>
                                        <th style={{textAlign: 'right'}}>Processing Fee</th>
                                        <th style={{textAlign: 'right'}}>Fee Offset</th>
                                        <th style={{textAlign: 'right'}}>Net Cost</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {completedSales.slice().reverse().map(sale => (
                                        <tr key={sale.id}>
                                            <td style={{fontSize: '0.75rem'}}>
                                                {sale.timestamp.toLocaleTimeString()}
                                            </td>
                                            <td>
                                                {sale.paymentMethod === 'cash' ? 'Cash' : 
                                                    `${sale.cardType === 'credit' ? 'Credit' : 'Debit'} Card`}
                                            </td>
                                            <td style={{textAlign: 'right'}}>
                                                <strong>${sale.totalAmount.toFixed(2)}</strong>
                                            </td>
                                            <td style={{textAlign: 'right', color: '#e74c3c'}}>
                                                -${sale.processingFee.toFixed(2)}
                                            </td>
                                            <td style={{textAlign: 'right', color: '#27ae60'}}>
                                                +${sale.feeOffset.toFixed(2)}
                                            </td>
                                            <td style={{textAlign: 'right'}}>
                                                <strong style={{color: sale.netFee <= 0 ? '#27ae60' : '#e74c3c'}}>
                                                    ${sale.netFee.toFixed(2)}
                                                </strong>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                </div>
            );

            return (
                <div className="app-container">
                    <div className="sidebar">
                        <div className="sidebar-header">
                            <div className="sidebar-title">GoDaddy Payments</div>
                            <div className="sidebar-subtitle">Cash Discount Demo</div>
                        </div>

                        <div className="nav-menu">
                            <div
                                className={`nav-item ${currentView === 'settings' ? 'active' : ''}`}
                                onClick={() => setCurrentView('settings')}
                            >
                                <span className="nav-icon">⚙️</span>
                                <span className="nav-label">Rate Saver Settings</span>
                            </div>

                            <div
                                className={`nav-item ${currentView === 'order' ? 'active' : ''}`}
                                onClick={() => setCurrentView('order')}
                            >
                                <span className="nav-icon">🛒</span>
                                <span className="nav-label">Create Order</span>
                                {cart.length > 0 && (
                                    <span style={{
                                        marginLeft: 'auto',
                                        background: '#e74c3c',
                                        color: 'white',
                                        borderRadius: '12px',
                                        padding: '0.125rem 0.5rem',
                                        fontSize: '0.75rem',
                                        fontWeight: '700'
                                    }}>
                                        {orderTotals.itemCount}
                                    </span>
                                )}
                            </div>

                            <div
                                className={`nav-item ${currentView === 'manual' ? 'active' : ''}`}
                                onClick={() => setCurrentView('manual')}
                            >
                                <span className="nav-icon">🔢</span>
                                <span className="nav-label">Manual Entry</span>
                            </div>

                            <div
                                className={`nav-item ${currentView === 'invoice' ? 'active' : ''}`}
                                onClick={() => setCurrentView('invoice')}
                            >
                                <span className="nav-icon">📄</span>
                                <span className="nav-label">Invoice</span>
                                {invoiceItems.length > 0 && (
                                    <span style={{
                                        marginLeft: 'auto',
                                        background: '#3498db',
                                        color: 'white',
                                        borderRadius: '12px',
                                        padding: '0.125rem 0.5rem',
                                        fontSize: '0.75rem',
                                        fontWeight: '700'
                                    }}>
                                        {invoiceItems.length}
                                    </span>
                                )}
                            </div>

                            <div
                                className={`nav-item ${currentView === 'checkout' ? 'active' : ''}`}
                                onClick={() => cart.length > 0 && setCurrentView('checkout')}
                                style={{opacity: cart.length === 0 ? 0.5 : 1, cursor: cart.length === 0 ? 'not-allowed' : 'pointer'}}
                            >
                                <span className="nav-icon">💳</span>
                                <span className="nav-label">Checkout</span>
                            </div>

                            <div
                                className={`nav-item ${currentView === 'reports' ? 'active' : ''}`}
                                onClick={() => setCurrentView('reports')}
                            >
                                <span className="nav-icon">📊</span>
                                <span className="nav-label">Fee Reports</span>
                                {completedSales.length > 0 && (
                                    <span style={{
                                        marginLeft: 'auto',
                                        background: '#27ae60',
                                        color: 'white',
                                        borderRadius: '12px',
                                        padding: '0.125rem 0.5rem',
                                        fontSize: '0.75rem',
                                        fontWeight: '700'
                                    }}>
                                        {completedSales.length}
                                    </span>
                                )}
                            </div>
                        </div>

                        <div className="sidebar-footer">
                            <div><strong>Active Program:</strong></div>
                            <div>{feeProgram === 'cash_discount' ? 'Cash Discount' : 'Surcharge'}</div>
                            {feeProgram === 'cash_discount' && (
                                <div>Discount: {cashDiscountPercent}%</div>
                            )}
                            <div style={{marginTop: '0.5rem', paddingTop: '0.5rem', borderTop: '1px solid rgba(255,255,255,0.1)'}}>
                                Demo Version 2.0
                            </div>
                        </div>
                    </div>

                    <div className="main-content">
                        {currentView === 'settings' && renderSettingsView()}
                        {currentView === 'order' && renderOrderView()}
                        {currentView === 'manual' && renderManualEntryView()}
                        {currentView === 'invoice' && renderInvoiceView()}
                        {currentView === 'checkout' && renderCheckoutView()}
                        {currentView === 'reports' && renderReportsView()}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<VirtualTerminalPOS />, document.getElementById('root'));
    </script>
</body>
</html>
